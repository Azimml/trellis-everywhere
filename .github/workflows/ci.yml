name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: lint + CPU tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU torch + dev tools)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the runner fast and GPU-free.
          pip install torch numpy --index-url https://download.pytorch.org/whl/cpu
          # Pin ruff so local and CI agree on lint rules across versions.
          pip install pytest "ruff==0.16.0"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Run CPU unit tests
        # The `cuda` marker (Triton kernel) is excluded via pyproject addopts.
        run: pytest
